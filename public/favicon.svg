<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a3160"/>
      <stop offset="100%" style="stop-color:#0f1e3d"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#2563eb"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>
  <!-- Accent left bar -->
  <rect x="6" y="9" width="3" height="14" rx="1.5" fill="url(#accent)"/>
  <!-- C shape top -->
  <rect x="11" y="9" width="10" height="3" rx="1.5" fill="url(#accent)"/>
  <!-- C shape bottom -->
  <rect x="11" y="20" width="10" height="3" rx="1.5" fill="url(#accent)"/>
  <!-- C shape right dot (open C) -->
  <rect x="19" y="14" width="3" height="4" rx="1.5" fill="url(#accent)" opacity="0.35"/>
</svg>
